name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]
  schedule:
    # Rebuild + redeploy tous les jours à 3h UTC pour générer les pages SEO
    # des produits/boutiques ajoutés depuis le dernier déploiement et
    # mettre à jour le sitemap (référencement Google en continu).
    - cron: '0 3 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ vars.NEXT_PUBLIC_APP_DOMAIN }}
          NEXT_PUBLIC_FEDAPAY_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_FEDAPAY_PUBLIC_KEY }}
          NEXT_PUBLIC_IMGBB_KEY: ${{ vars.NEXT_PUBLIC_IMGBB_KEY }}
          NEXT_PUBLIC_NOTIFY_API_URL: ${{ vars.NEXT_PUBLIC_NOTIFY_API_URL }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account
        run: |
          echo "$SA_JSON" > /tmp/sa.json
          echo "File size: $(wc -c < /tmp/sa.json) bytes"
          cat /tmp/sa.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('SA valid, project:', d.get('project_id','?'))"
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project vendor-00
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
